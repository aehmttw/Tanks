name: Check

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: JDK8
        uses: actions/setup-java@v3
        with:
          java-version: 8.0.312
          distribution: liberica

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build
        run: ./gradlew build

      - name: Lint
        id: lint
        continue-on-error: true
        run: ./gradlew lint

      - name: Count lint violations
        id: count_violations
        if: steps.lint.outcome == 'failure'
        run: |
          count=$(grep -r '<error ' build/reports/checkstyle/ | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Comment on PR if lint failed
        if: steps.lint.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const count = ${{ steps.count_violations.outputs.count }};
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `:warning: **Checkstyle found ${count} style violation${count === 1 ? '' : 's'}.** Download the **checkstyle-report** artifact from the [Actions run](${runUrl}) for details.`
            })

      - name: Determine artifact name
        id: find_artifact
        run: |
          file=$(basename build/libs/*.jar)
          echo "artifact_name=$file" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_artifact.outputs.artifact_name }}
          path: build/libs/*.jar

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/

