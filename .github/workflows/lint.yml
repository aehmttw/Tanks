name: Lint

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  lint:
    name: Checkstyle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: JDK8
        uses: actions/setup-java@v4
        with:
          java-version: 8.0.312
          distribution: liberica

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint
        id: lint
        continue-on-error: true
        run: ./gradlew lint

      - name: Count lint violations
        id: count_violations
        if: steps.lint.outcome == 'failure'
        run: |
          count=$(grep -r '<error ' build/reports/checkstyle/ | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Comment on PR if lint failed
        if: steps.lint.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const count = Number('${{ steps.count_violations.outputs.count }}');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `:warning: **Checkstyle found ${count} style violation${count === 1 ? '' : 's'}.** Download the **checkstyle-report** artifact from the [Actions run](${runUrl}) for details.`
            });

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/

      - name: Fail job if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1
